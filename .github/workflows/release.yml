# Publish the standalone Go module and its signed libhop source-install assets from one verified build.
name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  prepare:
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      source_sha: ${{ steps.provenance.outputs.source_sha }}
      native_artifact_name: ${{ steps.native-artifact.outputs.name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Mint canonical-source read token
        id: source-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.HOP_SOURCE_APP_ID }}
          private-key: ${{ secrets.HOP_SOURCE_APP_PRIVATE_KEY }}
          owner: hopmesh
          repositories: monorepo
          permission-actions: read
          permission-checks: read
          permission-contents: read
      - name: Verify canonical source, tag, tree, CI, and native provenance
        id: provenance
        env:
          SOURCE_TOKEN: ${{ steps.source-token.outputs.token }}
        run: >-
          python3 .github/release-provenance.py
          --component hop-sdk-go
          --require-native-artifacts
          --github-output "$GITHUB_OUTPUT"
      - name: Download canonical native bundle by run and artifact ID
        env:
          GH_TOKEN: ${{ steps.source-token.outputs.token }}
        run: >-
          python3 native/native-artifacts.py download-github
          --run-id '${{ steps.provenance.outputs.native_run_id }}'
          --run-attempt '${{ steps.provenance.outputs.native_run_attempt }}'
          --source-sha '${{ steps.provenance.outputs.source_sha }}'
          --output "$RUNNER_TEMP/native-release"
      - name: Verify signature, inventory, and canonical attestations
        env:
          GH_TOKEN: ${{ steps.source-token.outputs.token }}
        run: |
          python3 native/native-artifacts.py verify-provenance \
            --manifest "$RUNNER_TEMP/native-release/native-artifacts.json" \
            --signature "$RUNNER_TEMP/native-release/native-artifacts.json.sig" \
            --public-key native/native-artifacts-public.pem \
            --directory "$RUNNER_TEMP/native-release" \
            --provenance-bundle "$RUNNER_TEMP/native-release/native-artifacts.provenance.sigstore.json" \
            --source-sha '${{ steps.provenance.outputs.source_sha }}' \
            --tag "$GITHUB_REF_NAME" --run-id '${{ steps.provenance.outputs.native_run_id }}' \
            --run-attempt '${{ steps.provenance.outputs.native_run_attempt }}'
      - name: Bind native input artifact identity
        id: native-artifact
        run: echo "name=native-input-${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.native-artifact.outputs.name }}
          path: ${{ runner.temp }}/native-release/*
          if-no-files-found: error
          retention-days: 1

  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_artifact_name: ${{ steps.release-artifact.outputs.name }}
      release_artifact_attempt: ${{ steps.release-artifact.outputs.run_attempt }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.prepare.outputs.native_artifact_name }}
          path: ${{ runner.temp }}/native-release
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.22.12'
      - name: Validate the module and clean proxy consumer
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l .)"
          test -z "$unformatted" || { printf 'not gofmt-clean:\n%s\n' "$unformatted" >&2; exit 1; }
          mkdir "$RUNNER_TEMP/go-package-validation"
          python3 .github/package-export-smoke.py validate-go-export \
            --export . --work-root "$RUNNER_TEMP/go-package-validation" \
            --native-bundle "$RUNNER_TEMP/native-release"
      - name: Build and inspect release assets
        run: |
          set -euo pipefail
          release="$RUNNER_TEMP/release"
          mkdir "$release"
          git archive --format=zip --prefix="hop-sdk-go-${GITHUB_REF_NAME}/" \
            --output "$release/hop-sdk-go-${GITHUB_REF_NAME}.zip" HEAD
          unzip -Z1 "$release/hop-sdk-go-${GITHUB_REF_NAME}.zip" > "$RUNNER_TEMP/source-files.txt"
          grep -Fxq "hop-sdk-go-${GITHUB_REF_NAME}/go.mod" "$RUNNER_TEMP/source-files.txt"
          grep -Fxq "hop-sdk-go-${GITHUB_REF_NAME}/hop.h" "$RUNNER_TEMP/source-files.txt"
          grep -Fxq "hop-sdk-go-${GITHUB_REF_NAME}/cmd/hop-install/main.go" "$RUNNER_TEMP/source-files.txt"
          grep -Fxq "hop-sdk-go-${GITHUB_REF_NAME}/cmd/hop-install/native-artifacts-public.pem" "$RUNNER_TEMP/source-files.txt"
          if grep -Fq "/native/lib/" "$RUNNER_TEMP/source-files.txt"; then
            exit 1
          fi
          python3 - "$RUNNER_TEMP/native-release" "$release" <<'PY'
          import importlib.util
          import shutil
          import sys
          from pathlib import Path
          source, destination = map(Path, sys.argv[1:])
          spec = importlib.util.spec_from_file_location("native", "native/native-artifacts.py")
          native = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(native)
          manifest = native.load_manifest(source / "native-artifacts.json")
          for artifact in manifest["artifacts"]:
              if "-apple-darwin" in artifact["target"] or "-unknown-linux-gnu" in artifact["target"]:
                  shutil.copy2(source / artifact["filename"], destination / artifact["filename"])
          shutil.copy2(source / "native-artifacts.json", destination / "native-artifacts.json")
          shutil.copy2(source / "native-artifacts.json.sig", destination / "native-artifacts.json.sig")
          shutil.copy2(source / "native-artifacts.provenance.sigstore.json", destination / "native-artifacts.provenance.sigstore.json")
          PY
          python3 .github/release-artifact.py create --directory "$release" \
            --canonical-source-sha '${{ needs.prepare.outputs.source_sha }}'
      - name: Bind release artifact identity
        id: release-artifact
        run: |
          echo "name=release-${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
          echo "run_attempt=$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.release-artifact.outputs.name }}
          path: ${{ runner.temp }}/release/*
          if-no-files-found: error

  publish:
    needs: [prepare, build]
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.release_artifact_name }}
          path: ${{ runner.temp }}/release
      - name: Verify immutable release assets
        run: >-
          python3 .github/release-artifact.py verify --directory "$RUNNER_TEMP/release"
          --canonical-source-sha '${{ needs.prepare.outputs.source_sha }}'
          --run-attempt '${{ needs.build.outputs.release_artifact_attempt }}'
      - name: Attest verified Go release assets
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ runner.temp }}/release/*
      - name: Create the GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
          files: ${{ runner.temp }}/release/*
